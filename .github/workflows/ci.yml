name: CI

on: push

jobs:
  print-info:
    runs-on: ubuntu-latest

    steps:
      - name: Print Repository
        run: echo ${{ github.repository }}

      - name: Print Branch
        run: echo ${{ github.ref_name }}

      - name: Print Commit
        run: echo ${{ github.sha }}

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List files
        run: ls -la


      - name: Check Docker
        run: docker --version

      - name: Build Docker image
        run: docker build -t hello-devops .
