name: CI

on: push

jobs:
  print-info:
    runs-on: ubuntu-latest

    steps:
      - name: Print Repository
        run: echo ${{ github.repository }}

      - name: Print Branch
        run: echo ${{ github.ref_name }}

      - name: Print Commit
        run: echo ${{ github.sha }}

      - name: test
        run: ls -la
